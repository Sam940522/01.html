<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ESP32 Firebase 監控</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
}

.left, .right {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
}

.left .box {
    width: 90%;
    padding: 20px;
    border-radius: 10px;
    color: white;
    text-align: center;
}

.hum { background: linear-gradient(#4facfe, #00f2fe); }
.temp { background: linear-gradient(#ff9966, #ff5e62); }

.right {
    background: white;
}

.value {
    font-size: 50px;
}

.status {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #333;
}
</style>
</head>

<body>

<div class="left">
    <div class="box hum">
        <h2>濕度</h2>
        <div class="value" id="hum">--</div>
    </div>

    <div class="box temp">
        <h2>溫度</h2>
        <div class="value" id="temp">--</div>
    </div>
</div>

<div class="right">
    <h2>溫度趨勢</h2>
    <canvas id="chart"></canvas>
</div>

<div class="status" id="status">初始化...</div>

<script>
const ctx = document.getElementById("chart").getContext("2d");

const dataChart = {
    labels: [],
    datasets: [{
        label: "溫度",
        data: [],
        borderColor: "red",
        tension: 0.3
    }]
};

const chart = new Chart(ctx, {
    type: "line",
    data: dataChart
});

async function update() {
    try {
        const url = "https://removewesh-default-rtdb.firebaseio.com/.json";

        const res = await fetch(url);
        const data = await res.json();

        console.log("Firebase:", data);

        // ✅ 正確路徑（你已確認）
        const temp = data.sensor.temperature;
        const hum = data.sensor.humidity;

        document.getElementById("temp").innerText = temp + "°C";
        document.getElementById("hum").innerText = hum + "%";

        const time = new Date().toLocaleTimeString();

        dataChart.labels.push(time);
        dataChart.datasets[0].data.push(temp);

        if (dataChart.labels.length > 6) {
            dataChart.labels.shift();
            dataChart.datasets[0].data.shift();
        }

        chart.update();

        document.getElementById("status").innerText = "已連線";

    } catch (err) {
        console.error("錯誤:", err);
        document.getElementById("status").innerText = "連線失敗";
    }
}

update();
setInterval(update, 2000);
</script>

</body>
</html>
