<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ESP32 溫濕度監控</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
}

/* 左右區塊 */
.left, .right {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
}

/* 濕度 */
.left .top {
    width: 90%;
    background: linear-gradient(#4facfe, #00f2fe);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    color: white;
}

/* 溫度 */
.left .bottom {
    width: 90%;
    background: linear-gradient(#ff9966, #ff5e62);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    color: white;
}

/* 右側圖表 */
.right {
    background: white;
    color: black;
}

canvas {
    width: 90% !important;
    height: 70% !important;
}

h1 {
    margin: 0;
    font-size: 28px;
}

.value {
    font-size: 50px;
    margin-top: 10px;
}

.status {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #333;
}
</style>
</head>

<body>

<div class="left">
    <div class="top">
        <h1>濕度</h1>
        <div class="value" id="hum">--%</div>
    </div>

    <div class="bottom">
        <h1>溫度</h1>
        <div class="value" id="tempText">--°C</div>
    </div>
</div>

<div class="right">
    <h1>溫度趨勢</h1>
    <canvas id="tempChart"></canvas>
</div>

<div class="status" id="status">連線中...</div>

<script>
const ctx = document.getElementById('tempChart').getContext('2d');

const tempData = {
    labels: [],
    datasets: [{
        label: '溫度 (°C)',
        data: [],
        borderColor: 'red',
        borderWidth: 2,
        tension: 0.3
    }]
};

const chart = new Chart(ctx, {
    type: 'line',
    data: tempData,
    options: {
        responsive: true,
        animation: false,
        scales: {
            x: { ticks: { color: 'black' } },
            y: { ticks: { color: 'black' } }
        }
    }
});

async function updateData() {
    try {
        // ✅ Firebase 正確路徑
        const res = await fetch("https://remove-wet-ash-default-rtdb.asia-southeast1.firebasedatabase.app/.json");
        if (!res.ok) throw new Error("Firebase 無回應");

        const data = await res.json();

        // ✅ 正確結構：sensor
        const temp = data.sensor.temperature;
        const hum = data.sensor.humidity;

        // 更新數值
        document.getElementById("hum").innerText = hum + "%";
        document.getElementById("tempText").innerText = temp + "°C";

        // 時間
        const now = new Date();
        const time = String(now.getHours()).padStart(2,'0') + ":" +
                     String(now.getMinutes()).padStart(2,'0') + ":" +
                     String(now.getSeconds()).padStart(2,'0');

        // 加入圖表
        tempData.labels.push(time);
        tempData.datasets[0].data.push(temp);

        // 保留 6 筆
        if (tempData.labels.length > 6) {
            tempData.labels.shift();
            tempData.datasets[0].data.shift();
        }

        chart.update();

        document.getElementById("status").innerText = "已連線 Firebase";

    } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "連線失敗";
    }
}

setInterval(updateData, 2000);
updateData();
</script>

</body>
</html>
